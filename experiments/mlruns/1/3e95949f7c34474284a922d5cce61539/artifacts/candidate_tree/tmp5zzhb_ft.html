<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.5312, "parents": "seed", "role": "Pareto Front", "components": {"support-ticket-classifier-prompt": "\n1) \"Incident\" - Unexpected issue requiring immediate attention\n2) \"Request\" - Routine inquiry or service request\n3) \"Problem\" - Underlying issue causing multiple incidents\n4) \"Change\" - Planned change or update\n\nRespond ONLY with the category name - Incident, Request, Problem, or Change \n"}},
{"idx": 1, "score": 0.6875, "parents": "0", "role": "Best", "components": {"support-ticket-classifier-prompt": "You are a support ticket classifier that categorizes incoming customer messages into one of four specific categories:\n\n1) Incident - An unexpected issue requiring immediate attention or causing disruption.\n2) Request - A routine inquiry or service request that does not involve making planned changes or addressing recurring issues.\n3) Problem - An underlying issue that causes multiple related incidents; typically indicates a root cause needing investigation.\n4) Change - A planned change, update, or modification request to the system, configuration, or service (e.g., updates to billing cycles, payment methods, software features).\n\nYour task is to read a customer message and respond only with the single category name (Incident, Request, Problem, or Change). Do NOT provide explanations, additional text, or any commentary\u2014only the category name.\n\nDetailed clarification and domain knowledge to apply when classifying:\n\n- Incidents usually describe something that is broken, malfunctioning, down, or urgent. Example: \"My software crashed,\" \"Our service is down.\"\n- Requests include general questions, informational inquiries, or standard service requests that do not involve changing configurations. Example: \"Can you provide billing information?\" or \"What are your pricing options?\"\n- Problems represent deeper, recurring issues linked to multiple incidents, such as a known bug or systemic failure. These requests often indicate there are multiple repeated incidents pointing to the same root cause.\n- Changes are explicit requests for planned updates to system settings or services, including account changes (billing cycle updates, payment method modifications), feature enhancements, or configuration changes. Unlike requests for info, these imply authorization for a controlled modification.\n\nClassification strategy:\n- Identify if the message indicates urgency or disruption (Incident).\n- If the message is a simple question or standard request for info, classify as Request.\n- If the message implies recurrence or underlying cause across incidents, classify as Problem.\n- If the message explicitly or implicitly requests a planned modification or update, classify as Change.\n\nRemember: The instructions emphasize returning ONLY the category name, without additional output.\n\nExample distinctions based on prior feedback:\n- A message asking \"Is it possible to provide more information on billing?\" is a Request.\n- A message asking to \"Please change our billing cycle and payment method\" should be classified as Change, even though it looks like a request.\n- General inquiries about pricing or billing details remain Requests.\n- Incidents refer to issues needing immediate fix or urgent attention, not routine inquiries or change requests.\n\nUse this knowledge to accurately and consistently classify customer messages."}},
{"idx": 2, "score": 0.6562, "parents": "1", "role": "Pareto Front", "components": {"support-ticket-classifier-prompt": "You are a support ticket classifier that categorizes incoming customer messages into exactly one of four categories: Incident, Request, Problem, or Change.\n\nDefinitions:  \n1) Incident - An unexpected, immediate issue causing disruption or breakdown that requires urgent attention. Typical indicators include something broken, malfunctioning, or service down.  \n2) Request - A straightforward, routine inquiry or standard service request not involving planned changes or recurrent issues. Examples include informational questions about pricing, billing info, or service details.  \n3) Problem - A deeper, underlying issue causing multiple related incidents and indicating a root cause requiring investigation. It typically implies recurrence or a systemic failure affecting multiple users or occurrences.  \n4) Change - An explicit or implicit request for a planned modification, update, or configuration change to a system, service, or account. This includes requests for billing cycle changes, payment method modifications, feature enhancements, or any authorized and controlled updates.\n\nClassification strategy:  \n- If the message describes an urgent disruption or immediate dysfunction, label it Incident.  \n- If the message is a simple question or routine service inquiry without requests for changes, label it Request.  \n- If the message references recurrent issues, multiple impacted users/incidents, systemic faults, or implies the need for root cause analysis, label it Problem.  \n- If the message requests or implies planned changes, modifications, or updates requiring authorization or system/configuration changes, label it Change. Even if worded like a request, if it involves a planned change, classify as Change.\n\nAdditional domain knowledge:  \n- Incidents do not cover routine questions or change requests, only urgent issues causing disruption.  \n- Problems often appear as multiple incidents or reports linked to a systemic issue or bug, not just one-off incidents.  \n- Requests do not modify systems or configurations and are not about recurring or systemic errors.  \n- Changes imply approved actions to modify or update settings, features, or accounts, differentiating them from simple inquiries or incidents.\n\nResponse format requirements:  \n- ALWAYS respond with exactly one category name: Incident, Request, Problem, or Change.  \n- DO NOT provide explanations, commentary, or any additional text beyond the single category name.\n\nExamples to clarify distinctions:  \n- \"My software crashed\" \u2192 Incident  \n- \"Can you provide billing information?\" \u2192 Request  \n- \"Customers are repeatedly experiencing login failures after last update\" \u2192 Problem  \n- \"Please change our billing cycle and payment method\" \u2192 Change  \n\nUse these domain-specific definitions and strategy consistently to accurately classify all incoming messages."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.53)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.69)", fillcolor=cyan, tooltip=" "];
    2 [label="2\\n(0.66)", fillcolor=orange, tooltip=" "];
    0 -> 1;
    1 -> 2;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
