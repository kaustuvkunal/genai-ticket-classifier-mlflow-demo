<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.6562, "parents": "seed", "role": "Pareto Front", "components": {"support-ticket-classifier-prompt": "Classify the following customer support message into **exactly one** of these categories:\n\n- Incident  : unexpected issue requiring immediate attention\n- Request   : routine inquiry or service request\n- Problem   : underlying / systemic issue causing multiple incidents\n- Change    : planned change, update or configuration request\n\nCustomer message:\n{{customer_message}}\n\nReturn **only** the category name.\nAllowed answers: Incident, Request, Problem, Change\nNo explanation. No extra text.\n"}},
{"idx": 1, "score": 0.7188, "parents": "0", "role": "", "components": {"support-ticket-classifier-prompt": "Instructions for Classifying Customer Support Messages:\n\nTask Description:\nYou are tasked with classifying customer support messages into one of four distinct categories. Each message you receive will contain information regarding customer inquiries, issues, or requests. Your goal is to accurately classify each message into one of the defined categories. It is crucial that you provide exactly one category name as the output, without any additional explanations or text.\n\nCategories:\n- Incident: This refers to any unexpected issue that demands immediate attention and action. Look for messages that describe urgent, unforeseen problems that need to be resolved swiftly to prevent further complications.\n\n- Request: This category focuses on routine inquiries or service requests. These are typically straightforward communications where the customer is asking for information, clarification, or standard assistance that doesn't involve critical problems.\n\n- Problem: Here, the focus is on underlying or systemic issues that result in multiple incidents. These messages might highlight ongoing, unresolved issues that indicate a larger problem within the system or service.\n\n- Change: Messages in this category involve planned changes, updates, or configuration requests. These are deliberate actions intended to alter or improve existing systems, services, or configurations as a part of standard operations or strategic development.\n\nClassification Strategy:\n1. Carefully read the customer message to identify the main theme and intent.\n2. Determine whether the issue is urgent and unexpected (Incident), or if it is a standard request for information or service (Request).\n3. Check if the message describes a larger, underlying issue that suggests systemic troubles (Problem).\n4. Look for indications of a planned or requested change in systems, configurations, or services (Change).\n5. Select the category name that best fits the content and nature of the customer message.\n6. Output only the category name with no additional explanation.\n\nAdditional Notes:\n- Avoid making assumptions beyond the content of the message.\n- Maintain accuracy by aligning your choice with the definitions provided for each category.\n- Consistency is key; apply the same logic and criteria across all messages to ensure reliable classification results."}},
{"idx": 2, "score": 0.7031, "parents": "0", "role": "", "components": {"support-ticket-classifier-prompt": "Instructions for Classifying Customer Support Messages:\n\n1. **Objective**:\n   Classify a customer support message into **exactly one** of the four categories: Incident, Request, Problem, or Change.\n\n2. **Categories**:\n   - **Incident**:\n     - Definition: An unexpected issue that requires immediate attention.\n     - Characteristics: Typically involves urgent matters, unexpected disruptions, and may require swift resolution.\n   \n   - **Request**:\n     - Definition: A routine inquiry or service request.\n     - Characteristics: Involves questions, general information inquiries, assistance, or seeking clarification on existing services without urgency.\n\n   - **Problem**:\n     - Definition: An underlying or systemic issue causing multiple incidents.\n     - Characteristics: Refers to issues affecting multiple users or systems, indicating potential underlying root causes requiring investigation.\n   \n   - **Change**:\n     - Definition: A planned change, update, or configuration request.\n     - Characteristics: Involves requests for updates to existing services or configurations, planned changes in settings, billing information, payment details, or any modifications to active accounts or systems.\n\n3. **Classification Process**:\n   - Carefully read the provided customer support message.\n   - Determine the primary purpose and context of the message based on the definitions and characteristics of the categories.\n   - Identify keywords or phrases that align with the characteristics of each category. For example, look for terms indicating urgency or disruption for \"Incident,\" requests for clarification or details for \"Request,\" mentions of multiple user impacts for \"Problem,\" and requests for modifications or updates for \"Change.\"\n\n4. **Output**:\n   - Return **only** the category name as either \"Incident,\" \"Request,\" \"Problem,\" or \"Change.\"\n   - Provide no explanation or additional text beyond the single category name.\n\n5. **Examples**:\n   - A message seeking to update billing information: \"Change\"\n   - An inquiry about pricing plans and subscription details: \"Request\"\n   - A communication reporting a systemic failure impacting multiple accounts: \"Problem\"\n   - A report of a website outage requiring immediate attention: \"Incident\"\n\nThe classification relies on accurate interpretation of the message intent to ensure correct categorization aligning with the definitions and features outlined above."}},
{"idx": 3, "score": 0.7656, "parents": "2", "role": "Best", "components": {"support-ticket-classifier-prompt": "Instructions for Classifying Customer Support Messages:\n\n1. **Objective**:\n   Classify a customer support message into **exactly one** of the four categories: Incident, Request, Problem, or Change.\n\n2. **Categories**:\n   - **Incident**:\n     - Definition: An unexpected issue that requires immediate attention.\n     - Characteristics: Typically involves urgent matters, unexpected disruptions, and may require swift resolution.\n     - Identifying Factors: Look for urgency keywords such as \"immediate,\" \"urgent,\" \"outage,\" or similar terms indicating a crisis situation needing immediate action.\n\n   - **Request**:\n     - Definition: A routine inquiry or service request.\n     - Characteristics: Involves questions, general information inquiries, assistance, or seeking clarification on existing services without urgency.\n     - Identifying Factors: Focus on inquiries or asking for information regarding services, features, or routine processes without urgency or immediate action needed.\n\n   - **Problem**:\n     - Definition: An underlying or systemic issue causing multiple incidents.\n     - Characteristics: Refers to issues affecting multiple users or systems, indicating potential underlying root causes requiring investigation.\n     - Identifying Factors: Look for mentions of systemic failures or multiple user impacts, such as \"billing problems with several products,\" \"payment gateway malfunction,\" or references to root cause analysis.\n\n   - **Change**:\n     - Definition: A planned change, update, or configuration request.\n     - Characteristics: Involves requests for updates to existing services or configurations, planned changes in settings, billing information, payment details, or any modifications to active accounts or systems.\n     - Identifying Factors: Keywords such as \"update,\" \"modify,\" \"change billing information,\" \"update settings,\" or similar terms indicate a proactive change or configuration request.\n\n3. **Classification Process**:\n   - Carefully read the provided customer support message.\n   - Analyze the content to determine the primary purpose and context of the message.\n   - Identify keywords or phrases that match the characteristics or definitions of each category. \n   - Consider the nuances and choose the category that best fits the context of the message, ensuring it aligns with the predefined characteristics.\n\n4. **Output**:\n   - Return **only** the category name as either \"Incident,\" \"Request,\" \"Problem,\" or \"Change.\"\n   - Do not provide explanation or additional text beyond the single category name.\n\n5. **Examples**:\n   - A message seeking to update billing information: \"Change\"\n   - An inquiry about pricing plans and subscription details: \"Request\"\n   - A communication reporting a systemic failure impacting multiple accounts: \"Problem\"\n   - A report of a website outage requiring immediate attention: \"Incident\"\n\n6. **Review**:\n   - Evaluate the feedback from previous classifications to ensure continual improvement and accuracy.\n   - Adjust your interpretation as necessary based on contextual clues and any additional guidance provided in feedback for future tasks."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.66)", fillcolor=orange, tooltip=" "];
    1 [label="1\\n(0.72)", fillcolor=lightgray, tooltip=" "];
    2 [label="2\\n(0.70)", fillcolor=lightgray, tooltip=" "];
    3 [label="3\\n(0.77)", fillcolor=cyan, tooltip=" "];
    0 -> 1;
    0 -> 2;
    2 -> 3;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
